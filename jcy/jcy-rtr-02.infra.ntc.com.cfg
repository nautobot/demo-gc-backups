interface GigabitEthernet3
 ip address 10.2.3.0 255.255.255.254
 negotiation auto
 no mop enabled
 no mop sysid
!
interface GigabitEthernet4
 ip address 10.2.1.1 255.255.255.254
 negotiation auto
 no mop enabled
 no mop sysid
!
interface GigabitEthernet5
